<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentCordon — The identity layer your agents deserve</title>
  <meta name="description" content="Secure, auditable, policy-controlled credential brokerage for autonomous agents. Self-hosting first." />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Full-viewport hero */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      /* Base color + pinstripe texture */
      background: #1a1a1a;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 1px,
          transparent 1px,
          transparent 20px
        );
    }

    /* Particle canvas — full viewport behind content */
    .particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Content floats above canvas */
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      padding: 24px;
    }

    /* Glowing tartan bowtie */
    .bowtie-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .bowtie-svg {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(212,85,26,0.3));
    }

    /* Title */
    .hero-title {
      font-size: 56px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    /* Tagline */
    .hero-tagline {
      font-size: 18px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 48px;
    }

    /* Install command box */
    .install-box {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 28px;
      display: inline-flex;
      align-items: center;
      gap: 20px;
      max-width: 100%;
      transition: border-color 0.2s ease;
    }

    .install-box:hover {
      border-color: rgba(255,255,255,0.2);
    }

    .install-box code {
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Courier New', monospace;
      font-size: 16px;
      color: #fff;
      white-space: nowrap;
      user-select: all;
    }

    .copy-btn {
      background: #d4551a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, transform 0.1s ease;
      min-width: 80px;
    }

    .copy-btn:hover {
      background: #e06020;
    }

    .copy-btn:active {
      transform: scale(0.97);
    }

    .copy-btn:focus-visible {
      outline: 2px solid #d4551a;
      outline-offset: 2px;
    }

    /* Links row */
    .links {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 28px;
      list-style: none;
    }

    .links a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s ease;
    }

    .links a:hover {
      color: rgba(255,255,255,0.8);
    }

    .links a:focus-visible {
      outline: 2px solid #d4551a;
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* Footer pinned to bottom */
    .hero-footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1;
    }

    .hero-footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .bowtie-svg {
        width: 140px;
      }

      .bowtie-wrap {
        margin-bottom: 28px;
      }

      .hero-title {
        font-size: 36px;
        letter-spacing: -1px;
      }

      .hero-tagline {
        font-size: 15px;
        margin-bottom: 36px;
      }

      .install-box {
        flex-direction: column;
        gap: 12px;
        padding: 16px 20px;
        width: 100%;
      }

      .install-box code {
        font-size: 13px;
        word-break: break-all;
        white-space: normal;
      }

      .links {
        gap: 20px;
        margin-top: 32px;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 28px;
      }

      .hero-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>

    <div class="hero-content">
      <!-- Glowing tartan bowtie -->
      <div class="bowtie-wrap" aria-hidden="true">
        <svg class="bowtie-svg" viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="tartan" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(0)">
              <rect width="20" height="20" fill="#d4551a"/>
              <line x1="0" y1="0" x2="20" y2="0" stroke="rgba(180,60,10,0.6)" stroke-width="3"/>
              <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(220,120,50,0.4)" stroke-width="1.5"/>
              <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(180,60,10,0.6)" stroke-width="3"/>
              <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(220,120,50,0.4)" stroke-width="1.5"/>
              <line x1="0" y1="5" x2="20" y2="5" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="0" y1="15" x2="20" y2="15" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="5" y1="0" x2="5" y2="20" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="15" y1="0" x2="15" y2="20" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
            </pattern>
            <filter id="bowtieGlow">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>
          <g filter="url(#bowtieGlow)">
            <path d="M8 18 Q8 12, 14 12 L75 55 Q82 60, 82 70 Q82 80, 75 85 L14 128 Q8 128, 8 122 Z" fill="url(#tartan)"/>
            <path d="M212 18 Q212 12, 206 12 L145 55 Q138 60, 138 70 Q138 80, 145 85 L206 128 Q212 128, 212 122 Z" fill="url(#tartan)"/>
            <rect x="84" y="44" width="52" height="52" rx="12" fill="url(#tartan)"/>
          </g>
        </svg>
      </div>

      <h1 class="hero-title">AgentCordon</h1>
      <p class="hero-tagline">The identity layer your agents deserve.</p>

      <div class="install-box">
        <code id="install-cmd">curl -fsSL https://getcordoned.sh | bash</code>
        <button class="copy-btn" id="copy-btn" type="button" aria-label="Copy install command to clipboard">Copy</button>
      </div>

      <nav aria-label="Links">
        <ul class="links">
          <li><a href="https://github.com/agentcordon/agentcordon">GitHub</a></li>
          <li><a href="https://docs.getcordoned.sh">Docs</a></li>
          <li><a href="https://discord.gg/agentcordon">Discord</a></li>
        </ul>
      </nav>
    </div>

    <div class="hero-footer">
      <p>Self-hosting first. Always.</p>
      <p>&copy; 2025 AgentCordon</p>
    </div>
  </div>

  <script>
  /* Particle network animation */
  (function() {
    var canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var COUNT = 48;
    var LINK_DIST = 120;
    var raf;

    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * devicePixelRatio;
      canvas.height = rect.height * devicePixelRatio;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function init() {
      resize();
      var w = canvas.width / devicePixelRatio;
      var h = canvas.height / devicePixelRatio;
      particles = [];
      for (var i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.5 + 1
        });
      }
    }

    function draw() {
      var w = canvas.width / devicePixelRatio;
      var h = canvas.height / devicePixelRatio;
      ctx.clearRect(0, 0, w, h);

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      }

      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            var alpha = (1 - dist / LINK_DIST) * 0.15;
            ctx.strokeStyle = 'rgba(212,85,26,' + alpha + ')';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }

      for (var i = 0; i < particles.length; i++) {
        ctx.fillStyle = 'rgba(212,85,26,0.35)';
        ctx.beginPath();
        ctx.arc(particles[i].x, particles[i].y, particles[i].r, 0, Math.PI * 2);
        ctx.fill();
      }

      raf = requestAnimationFrame(draw);
    }

    var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (!mq.matches) {
      init();
      draw();
      window.addEventListener('resize', resize);
    }

    window.addEventListener('beforeunload', function() {
      cancelAnimationFrame(raf);
    });
  })();

  /* Copy to clipboard */
  (function() {
    var btn = document.getElementById('copy-btn');
    var cmd = document.getElementById('install-cmd');
    if (!btn || !cmd) return;

    btn.addEventListener('click', function() {
      var text = cmd.textContent || cmd.innerText;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onCopied, fallbackCopy);
      } else {
        fallbackCopy();
      }
    });

    function fallbackCopy() {
      var range = document.createRange();
      range.selectNodeContents(cmd);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      try { document.execCommand('copy'); onCopied(); } catch(e) {}
      sel.removeAllRanges();
    }

    function onCopied() {
      var orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.setAttribute('aria-label', 'Copied to clipboard');
      setTimeout(function() {
        btn.textContent = orig;
        btn.setAttribute('aria-label', 'Copy install command to clipboard');
      }, 2000);
    }
  })();
  </script>
</body>
</html>
