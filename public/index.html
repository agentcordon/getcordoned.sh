<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentCordon — The identity layer your agents deserve</title>
  <meta name="description" content="Secure, auditable, policy-controlled credential brokerage for autonomous agents. Self-hosting first." />
  <meta name="theme-color" content="#111111" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111111'/%3E%3Cg transform='translate(3,8)'%3E%3Cpath d='M1 2Q1 0 3 0L10 6Q11 7.5 11 8Q11 8.5 10 10L3 16Q1 16 1 14Z' fill='%23d4551a'/%3E%3Cpath d='M25 2Q25 0 23 0L16 6Q15 7.5 15 8Q15 8.5 16 10L23 16Q25 16 25 14Z' fill='%23d4551a'/%3E%3Crect x='11' y='5' width='4' height='6' rx='1.5' fill='%23d4551a'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Full-viewport hero */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111111;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 1px,
          transparent 20px
        );
    }

    /* Particle canvas — full viewport behind content */
    .particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Content floats above canvas */
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 620px;
      padding: 24px;
    }

    /* Glowing tartan bowtie */
    .bowtie-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .bowtie-svg {
      width: 180px;
      height: auto;
      filter: drop-shadow(0 0 24px rgba(212,85,26,0.25));
    }

    /* Title — Space Grotesk for technical authority */
    .hero-title {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    /* Tagline */
    .hero-tagline {
      font-size: 17px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      margin-bottom: 44px;
      letter-spacing: 0.1px;
    }

    /* Install command box */
    .install-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 14px 16px 14px 24px;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      max-width: 100%;
      transition: border-color 0.2s ease;
    }

    .install-box:hover {
      border-color: rgba(255,255,255,0.15);
    }

    .install-box code {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      user-select: all;
      letter-spacing: -0.3px;
    }

    .install-prefix {
      color: rgba(212,85,26,0.7);
      user-select: none;
    }

    .copy-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      min-width: 72px;
    }

    .copy-btn:hover {
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
    }

    .copy-btn:active {
      transform: scale(0.97);
    }

    .copy-btn:focus-visible {
      outline: 2px solid #d4551a;
      outline-offset: 2px;
    }

    .copy-btn.copied {
      color: #4ade80;
      border-color: rgba(74,222,128,0.25);
    }

    /* Links row */
    .links {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 24px;
      list-style: none;
    }

    .links a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3px;
      transition: color 0.2s ease;
    }

    .links a:hover {
      color: rgba(255,255,255,0.7);
    }

    .links a:focus-visible {
      outline: 2px solid #d4551a;
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* GitHub icon inline */
    .gh-icon {
      display: inline-block;
      vertical-align: -2px;
      margin-right: 6px;
      opacity: 0.6;
    }

    /* Footer pinned to bottom */
    .hero-footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1;
    }

    .hero-footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      line-height: 1.8;
      letter-spacing: 0.2px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .bowtie-svg {
        width: 120px;
      }

      .bowtie-wrap {
        margin-bottom: 24px;
      }

      .hero-title {
        font-size: 36px;
        letter-spacing: -0.3px;
      }

      .hero-tagline {
        font-size: 15px;
        margin-bottom: 32px;
      }

      .install-box {
        flex-direction: column;
        gap: 12px;
        padding: 16px 20px;
        width: 100%;
      }

      .install-box code {
        font-size: 13px;
        word-break: break-all;
        white-space: normal;
      }

      .copy-btn {
        width: 100%;
      }

      .links {
        gap: 20px;
        margin-top: 28px;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 28px;
      }

      .hero-tagline {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .hero-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>

    <div class="hero-content">
      <!-- Glowing tartan bowtie -->
      <div class="bowtie-wrap" aria-hidden="true">
        <svg class="bowtie-svg" viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="tartan" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(0)">
              <rect width="20" height="20" fill="#d4551a"/>
              <line x1="0" y1="0" x2="20" y2="0" stroke="rgba(180,60,10,0.6)" stroke-width="3"/>
              <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(220,120,50,0.4)" stroke-width="1.5"/>
              <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(180,60,10,0.6)" stroke-width="3"/>
              <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(220,120,50,0.4)" stroke-width="1.5"/>
              <line x1="0" y1="5" x2="20" y2="5" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="0" y1="15" x2="20" y2="15" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="5" y1="0" x2="5" y2="20" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
              <line x1="15" y1="0" x2="15" y2="20" stroke="rgba(140,40,5,0.3)" stroke-width="0.75"/>
            </pattern>
            <filter id="bowtieGlow">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>
          <g filter="url(#bowtieGlow)">
            <path d="M8 18 Q8 12, 14 12 L75 55 Q82 60, 82 70 Q82 80, 75 85 L14 128 Q8 128, 8 122 Z" fill="url(#tartan)"/>
            <path d="M212 18 Q212 12, 206 12 L145 55 Q138 60, 138 70 Q138 80, 145 85 L206 128 Q212 128, 212 122 Z" fill="url(#tartan)"/>
            <rect x="84" y="44" width="52" height="52" rx="12" fill="url(#tartan)"/>
          </g>
        </svg>
      </div>

      <h1 class="hero-title">Agent Cordon</h1>

      <div class="install-box">
        <code><span class="install-prefix">$ </span><span id="install-cmd">curl -fsSL https://getcordoned.sh | bash</span></code>
        <button class="copy-btn" id="copy-btn" type="button" aria-label="Copy install command to clipboard">Copy</button>
      </div>

      <nav aria-label="Links">
        <ul class="links">
          <li><a href="https://github.com/agentcordon/agentcordon"><svg class="gh-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a></li>
        </ul>
      </nav>
    </div>
  </div>

  <script>
  /* Particle network animation */
  (function() {
    var canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var COUNT = 48;
    var LINK_DIST = 120;
    var raf;

    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * devicePixelRatio;
      canvas.height = rect.height * devicePixelRatio;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function init() {
      resize();
      var w = canvas.width / devicePixelRatio;
      var h = canvas.height / devicePixelRatio;
      particles = [];
      for (var i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.5 + 1
        });
      }
    }

    function draw() {
      var w = canvas.width / devicePixelRatio;
      var h = canvas.height / devicePixelRatio;
      ctx.clearRect(0, 0, w, h);

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      }

      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            var alpha = (1 - dist / LINK_DIST) * 0.12;
            ctx.strokeStyle = 'rgba(212,85,26,' + alpha + ')';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }

      for (var i = 0; i < particles.length; i++) {
        ctx.fillStyle = 'rgba(212,85,26,0.3)';
        ctx.beginPath();
        ctx.arc(particles[i].x, particles[i].y, particles[i].r, 0, Math.PI * 2);
        ctx.fill();
      }

      raf = requestAnimationFrame(draw);
    }

    var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (!mq.matches) {
      init();
      draw();
      window.addEventListener('resize', resize);
    }

    window.addEventListener('beforeunload', function() {
      cancelAnimationFrame(raf);
    });
  })();

  /* Copy to clipboard */
  (function() {
    var btn = document.getElementById('copy-btn');
    var cmd = document.getElementById('install-cmd');
    if (!btn || !cmd) return;

    btn.addEventListener('click', function() {
      var text = cmd.textContent || cmd.innerText;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onCopied, fallbackCopy);
      } else {
        fallbackCopy();
      }
    });

    function fallbackCopy() {
      var range = document.createRange();
      range.selectNodeContents(cmd);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      try { document.execCommand('copy'); onCopied(); } catch(e) {}
      sel.removeAllRanges();
    }

    function onCopied() {
      var orig = btn.textContent;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      btn.setAttribute('aria-label', 'Copied to clipboard');
      setTimeout(function() {
        btn.textContent = orig;
        btn.classList.remove('copied');
        btn.setAttribute('aria-label', 'Copy install command to clipboard');
      }, 2000);
    }
  })();
  </script>
</body>
</html>
